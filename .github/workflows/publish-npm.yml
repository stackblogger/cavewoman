name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Check release tag matches package.json version
        run: |
          tag="${{ github.event.release.tag_name }}"
          ver="${tag#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$ver" != "$pkg" ]; then
            echo "Release tag is $tag (expected version $ver); package.json has $pkg"
            exit 1
          fi

      - run: npm publish --access public
